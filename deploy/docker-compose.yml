# Guacamole RemoteApp Portal — 一键部署
# 使用方法: docker compose up -d --build
#
# 首次启动时 MySQL 会自动导入 initdb/ 下的 SQL 文件。
# 如需重新初始化数据库，删除 mysql_data volume 后重建:
#   docker compose down -v && docker compose up -d --build

name: ${PORTAL_INSTANCE_ID:-nercar-portal}

services:
  guacd:
    image: guacamole/guacd:latest
    restart: unless-stopped
    user: root  # /drive volume 需要写权限; guacd 仅在内网不对外暴露
    environment:
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL:-${GUACD_LOG_LEVEL:-info}}
    volumes:
      - ${GUAC_DRIVE_SOURCE:-guacd_drive}:/drive

  guac-sql:
    image: mysql:8
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${GUAC_DB_ROOT_PASSWORD}}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-guacamole_db}
      MYSQL_USER: ${MYSQL_USER:-guacamole_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${GUAC_DB_PASSWORD}}
    ports:
      - target: 3306
        published: "${MYSQL_HOST_PORT:-33060}"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - ${MYSQL_DATA_SOURCE:-mysql_data}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-${GUAC_DB_ROOT_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  guac-web:
    build:
      context: .
      dockerfile: guac-web.Dockerfile
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-guacamole_db}
      MYSQL_HOSTNAME: guac-sql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${GUAC_DB_PASSWORD}}
      MYSQL_USER: ${MYSQL_USER:-guacamole_user}
      GUACD_HOSTNAME: guacd
      JSON_SECRET_KEY: ${JSON_SECRET_KEY:-${GUACAMOLE_JSON_SECRET_KEY}}
      WEBAPP_CONTEXT: "guacamole"
      API_SESSION_TIMEOUT: "480"
      # 禁用暴力破解保护 — Docker 架构下所有请求来自同一容器 IP，
      # 一旦触发会封锁整个 portal-backend，导致全员瘫痪
      BAN_ENABLED: "false"
    depends_on:
      guac-sql:
        condition: service_healthy
      guacd:
        condition: service_started

  portal-backend:
    build:
      context: ..
      dockerfile: deploy/portal.Dockerfile
    restart: unless-stopped
    environment:
      PORTAL_INSTANCE_ID: ${PORTAL_INSTANCE_ID:-nercar-portal}
      PORTAL_SERVICE_NAME: portal-backend
      TZ: ${TZ}
      PORTAL_DB_HOST: guac-sql
      PORTAL_DB_PORT: "3306"
      PORTAL_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${GUAC_DB_ROOT_PASSWORD}}
      GUACAMOLE_INTERNAL_URL: http://guac-web:8080/guacamole
      GUACAMOLE_EXTERNAL_URL: http://${PORTAL_HOST:-localhost}:${PORTAL_PORT:-80}/guacamole
      GUACAMOLE_JSON_SECRET_KEY: ${JSON_SECRET_KEY:-${GUACAMOLE_JSON_SECRET_KEY}}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET:-f7a3d9e2c1b5084a6e3f1d8b2a5c7e09}
    volumes:
      - ${GUAC_DRIVE_SOURCE:-guacd_drive}:/drive
    depends_on:
      guac-sql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - target: 80
        published: "${PORTAL_PORT:-80}"
        host_ip: "${PORTAL_BIND_IP:-0.0.0.0}"
        protocol: tcp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${GUAC_DRIVE_SOURCE:-guacd_drive}:/drive:ro
    depends_on:
      - portal-backend
      - guac-web

volumes:
  # ============================================================
  # 数据持久化策略
  #
  # 【默认】Docker Named Volume — 适用于 Windows 开发环境
  #   数据存在 Docker Desktop WSL2 VM 内，容器重启不丢失。
  #   备份方式: deploy/backup.sh export
  #   ⚠️ docker compose down -v 会删除数据！
  #
  # 【生产环境】通过 .env 指定宿主机目录绑定:
  #   MYSQL_DATA_SOURCE=/srv/portal/mysql
  #   GUAC_DRIVE_SOURCE=/srv/portal/drive
  #   需先创建目录: mkdir -p ${MYSQL_DATA_SOURCE} ${GUAC_DRIVE_SOURCE}
  #   ⚠️ MySQL 数据目录必须位于 Linux case-sensitive 文件系统上
  # ============================================================
  mysql_data:
  guacd_drive:
