<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteApp 门户</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">RemoteApp 门户</h1>
        <p class="header__subtitle">点击卡片启动远程应用</p>
    </header>

    <main class="container">
        <div id="app-grid" class="app-grid">
            <!-- 卡片由 JS 动态渲染 -->
        </div>
        <div id="loading" class="loading">加载中...</div>
        <div id="empty" class="empty" style="display:none;">暂无可用应用</div>
        <div id="error" class="error-msg" style="display:none;"></div>
    </main>

    <!-- 启动中遮罩 -->
    <div id="launch-overlay" class="overlay" style="display:none;">
        <div class="overlay__content">
            <div class="spinner"></div>
            <p>正在启动 <span id="launch-name"></span> ...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
