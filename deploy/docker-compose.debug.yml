services:
  portal-backend:
    command:
      - python
      - -m
      - uvicorn
      - backend.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --log-level
      - info
    volumes:
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../config:/app/config
