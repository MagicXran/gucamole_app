# Guacamole RemoteApp Portal - 站点配置
# 统一入口: 80 端口，反向代理 FastAPI + Guacamole

upstream portal_backend {
    server portal-backend:8000;
}

upstream guacamole_backend {
    server guac-web:8080;
}

server {
    listen 80;
    server_name _;

    # -- 安全响应头 --
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://esm.sh; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; frame-src 'self'; img-src 'self' data:; worker-src 'self' blob:;" always;

    # -- 文件上传 (流式转发, 不缓冲) --
    location /api/files/upload/ {
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_pass http://portal_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # -- 文件下载 (X-Accel-Redirect, sendfile 零拷贝) --
    location /internal-drive/ {
        internal;
        alias /drive/;
    }

    # -- FastAPI API --
    location /api/ {
        proxy_pass http://portal_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Guacamole (含 WebSocket 升级) --
    location /guacamole/ {
        proxy_pass http://guacamole_backend/guacamole/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -- 前端静态文件 + 其他路由 -> FastAPI --
    location / {
        proxy_pass http://portal_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
