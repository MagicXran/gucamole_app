# Guacamole RemoteApp Portal — 一键部署
# 使用方法: docker compose up -d --build
#
# 首次启动时 MySQL 会自动导入 initdb/ 下的 SQL 文件。
# 如需重新初始化数据库，删除 mysql_data volume 后重建:
#   docker compose down -v && docker compose up -d --build

name: nercar-portal

services:
  guacd:
    container_name: nercar-portal-guacd
    image: guacamole/guacd:latest
    restart: unless-stopped
    user: root  # /drive volume 需要写权限; guacd 仅在内网不对外暴露
    environment:
      TZ: ${TZ}
      GUACD_LOG_LEVEL: ${GUACD_LOG_LEVEL:-info}
    volumes:
      - guacd_drive:/drive

  guac-sql:
    container_name: nercar-portal-guac-sql
    image: mysql:8
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${GUAC_DB_ROOT_PASSWORD}}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-guacamole_db}
      MYSQL_USER: ${MYSQL_USER:-guacamole_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${GUAC_DB_PASSWORD}}
    ports:
      - "127.0.0.1:33060:3306"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-${GUAC_DB_ROOT_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  guac-web:
    container_name: nercar-portal-guac-web
    build:
      context: .
      dockerfile: guac-web.Dockerfile
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-guacamole_db}
      MYSQL_HOSTNAME: guac-sql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${GUAC_DB_PASSWORD}}
      MYSQL_USER: ${MYSQL_USER:-guacamole_user}
      GUACD_HOSTNAME: guacd
      JSON_SECRET_KEY: ${JSON_SECRET_KEY:-${GUACAMOLE_JSON_SECRET_KEY}}
      WEBAPP_CONTEXT: "guacamole"
      API_SESSION_TIMEOUT: "480"
      # 禁用暴力破解保护 — Docker 架构下所有请求来自同一容器 IP，
      # 一旦触发会封锁整个 portal-backend，导致全员瘫痪
      BAN_ENABLED: "false"
    depends_on:
      guac-sql:
        condition: service_healthy
      guacd:
        condition: service_started

  portal-backend:
    container_name: nercar-portal-backend
    build:
      context: ..
      dockerfile: deploy/portal.Dockerfile
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PORTAL_DB_HOST: guac-sql
      PORTAL_DB_PORT: "3306"
      PORTAL_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${GUAC_DB_ROOT_PASSWORD}}
      GUACAMOLE_INTERNAL_URL: http://guac-web:8080/guacamole
      GUACAMOLE_EXTERNAL_URL: http://${PORTAL_HOST:-localhost}:${PORTAL_PORT:-80}/guacamole
      GUACAMOLE_JSON_SECRET_KEY: ${JSON_SECRET_KEY:-${GUACAMOLE_JSON_SECRET_KEY}}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET:-${JSON_SECRET_KEY:-${GUACAMOLE_JSON_SECRET_KEY}}}
      PORTAL_BOOTSTRAP_ADMIN_USERNAME: ${PORTAL_BOOTSTRAP_ADMIN_USERNAME:-}
      PORTAL_BOOTSTRAP_ADMIN_PASSWORD: ${PORTAL_BOOTSTRAP_ADMIN_PASSWORD:-}
      PORTAL_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${PORTAL_BOOTSTRAP_ADMIN_DISPLAY_NAME:-管理员}
    volumes:
      - guacd_drive:/drive
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/ready').getcode() == 200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      guac-sql:
        condition: service_healthy

  nginx:
    container_name: nercar-portal-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - guacd_drive:/drive:ro
    depends_on:
      - portal-backend
      - guac-web

volumes:
  # ============================================================
  # 数据持久化策略
  #
  # 【默认】Docker Named Volume — 适用于 Windows 开发环境
  #   数据存在 Docker Desktop WSL2 VM 内，容器重启不丢失。
  #   备份方式: deploy/backup.sh export
  #   ⚠️ docker compose down -v 会删除数据！
  #
  # 【生产环境】取消下方 driver_opts 注释，改用 bind mount
  #   需先创建目录: mkdir -p ${DATA_DIR}/mysql ${DATA_DIR}/drive
  #   ⚠️ 不支持 Windows NTFS 路径 — MySQL 8 拒绝 case-insensitive 文件系统
  # ============================================================
  mysql_data:
    name: guacamole_mysql_data
    # --- 生产环境: 取消以下注释，DATA_DIR 指向 Linux 宿主机路径 ---
    # driver: local
    # driver_opts:
    #   type: none
    #   device: ${DATA_DIR}/mysql
    #   o: bind
  guacd_drive:
    name: guacamole_guacd_drive
    # --- 生产环境: 取消以下注释 ---
    # driver: local
    # driver_opts:
    #   type: none
    #   device: ${DATA_DIR}/drive
    #   o: bind
